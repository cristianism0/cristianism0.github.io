<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Espaço do Cristianism0</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
</head>
<body>
    <header>
        <h1>{{ page.title }}</h1>
        <p><small>{{ page.date | date: "%d/%m/%Y" }}</small></p>
        <button id="modo-toggle" aria-label="Alternar modo claro/escuro"></button>
        <nav>
            <ul>
                <li><a href="/">← Voltar para a Página Inicial</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="conteudo-post">
            {{ content }}
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Espaço do Cristianism0</p>
    </footer>
    <script src="/assets/js/script.js"></script>
</body>
</html>
