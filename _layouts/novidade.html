<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!--LOADIND ANTI-FOUC-->
<script>
  (function() {
    try {
      const theme = localStorage.getItem("theme");
      if (theme === "dark" || 
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    } catch (e) {
      document.documentElement.classList.remove("dark");
    }
  })();
</script>

    <a id="btnVoltarAoTopo" title="Voltar ao topo">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</a>

<script>
// Pega o botão
var mybutton = document.getElementById("btnVoltarAoTopo");

// Quando rolar 20px para baixo da parte superior do documento aparece o botão
window.onscroll = function() {scrollFunction()};

function scrollFunction() {
  if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
    mybutton.style.opacity = "1";
    mybutton.style.visibility = "visible";
  } else {
    mybutton.style.opacity = "0";
    mybutton.style.visibility = "hidden";
  }
}

// Role para o topo do documento
mybutton.onclick = function() {
  window.scrollTo({top: 0, behavior: 'smooth'});
}
</script>
</body>
