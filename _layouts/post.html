<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Espaço do Cristianism0</title>
    <link rel="stylesheet" href="/assets/css/style.css">

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
</head>
<body>
    <header>
        <h1>{{ page.title }}</h1>
        <p><small>Publicado em: {{ page.date | date: "%d/%m/%Y" }}</small></p>
        <button id="modo-toggle" aria-label="Alternar modo claro/escuro"></button>
        <nav>
            <ul>
                <li><a href="/">← Voltar para a Página Inicial</a></li>
            </ul>
        </nav>

    <main>
        <div class="conteudo-post">
            {{ content }}
        </div>
    </main>
<footer>
  <div class="footer-content">
    <div class="footer-left">
      <a href="https://github.com/cristianism0" target="_blank" class="social-btn github-btn">GitHub</a>
      <a href="https://linkedin.com/in/cristian-sales-7092212b4" target="_blank" class="social-btn linkedin-btn">LinkedIn</a>
    </div>
    <div class="footer-logo">&copy;Cristianism0</div>
    <div class="footer-right"></div>
  </div>
</footer>
    <script src="/assets/js/script.js"></script>

</html>
