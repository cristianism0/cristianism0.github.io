baseURL: "https://cristianism0.github.io"
defaultContentLanguage: pt
title: "Cristianism0"
theme: "seeding"

pagination:
  pageSize: 10

mainSections: ["posts"]
enableRobotsTXT: true

params:
  author: "Cristian"
  homeTitle: "Olá, bem vindo(a)! ☘️"
  homeLabel: "☘️"
  description: "Filosofia, computação e arte."
  avatar: "/images/avatar.jpeg"
  bio: "Escrevo sobre filosofia, código e outras coisas."
  ogImage: "/images/og.png"
  favicon: "/favicon"

  math: false           # true = KaTeX em todas as páginas
  shareButtons: true    # botões de compartilhar no fim de cada post
  profileMode: false    # true = home com avatar e bio
  customCSS: false      # true = ativa assets/css/custom.css
  breadcrumbs: true     # false = não mostra mais o caminho a partir da home
  readingTime: true     # false = não mostra o tempo de leitura
  wordCount: true       # false = não mostra a quantidade de palavras
  lastModified: false   # true = mostra a última modificação
  postNav: true         # false = não mostra as opções de anterior ou próximo ao final
  showCopyright: true   # false = esconde o copyright
  footerText: ""        # texto ao final
  email: "cristianism0.contato@gmail.com"

  social:
    github: "cristianism0"
    twitter: "dracutx86_64"
    email: "cristianism0.contato@gmail.com"

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    style: "friendly"
    lineNos: false
    lineNumbersInTable: false
    noClasses: false
    tabWidth: 2

  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false

taxonomies:
  tag: "tags"
  category: "categories"

menus:
  main:
    - name: "Posts"
      url: "/posts/"
      weight: 1
    - name: "Tags"
      url: "/tags/"
      weight: 2
    - name: "Sobre"
      url: "/sobre/"
      weight: 3
