baseURL: "https://cristianism0.github.io" 
defaultContentLanguage: pt
title: "Cristianism0"
theme: "seeding"

pagination:
  pageSize: 10

mainSections: ["posts"]
enableRobotsTXT: true

params:
  author: "Cristian"
  description: "Filosofia, computação e literatura."
  avatar: "/images/avatar.jpeg"
  bio: "Escrevo sobre filosofia, código e outras coisas."
  ogImage: "/images/og.png"   
  favicon: "/favicon"

  math: false           # true = KaTeX em todas as páginas
  shareButtons: true    # botões de compartilhar no fim de cada post
  profileMode: false    # true = home com avatar e bio
  customCSS: false      # true = enable assets/css/custom.css

  social:
    github: "cristianism0"
    twitter: "dracutx86_64"
    # mastodon: "https://mastodon.social/@user"
    email: "csg2099@gmail.com"

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    style: "friendly"
    lineNos: false
    lineNumbersInTable: false
    noClasses: false
    tabWidth: 2

  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false

taxonomies:
  tag: "tags"
  category: "categories"

menus:
  main:
    - name: "Posts"
      url: "/posts/"
      weight: 1
    - name: "Tags"
      url: "/tags/"
      weight: 2
    - name: "Sobre"
      url: "/sobre/"
      weight: 3
