{{ define "main" }}
<article class="page-single">
    {{ partial "breadcrumbs.html" . }}

    <header class="article-header">
        <h1 class="article-title">{{ .Title }}</h1>
        {{ with .Params.subtitle }}
        <p class="article-subtitle">{{ . }}</p>
        {{ end }}
    </header>

    <div class="article-body">{{ .Content }}</div>
</article>
{{ end }}
