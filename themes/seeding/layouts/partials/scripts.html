<script>
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    ['light','sepia','dark'].forEach(function(id) {
      var el = document.getElementById('th-' + id);
      if (el) el.classList.toggle('active', id === t);
    });
    localStorage.setItem('seeding-theme', t);
  }

  function setFont(s) {
    document.documentElement.setAttribute('data-font-size', s);
    ['small','medium','large'].forEach(function(id) {
      var el = document.getElementById('fs-' + id);
      if (el) el.classList.toggle('active', id === s);
    });
    localStorage.setItem('seeding-font', s);
  }

  (function() {
    var t = localStorage.getItem('seeding-theme') || 'light';
    var f = localStorage.getItem('seeding-font')  || 'medium';
    setTheme(t);
    setFont(f);
  })();

  var bar = document.getElementById('reading-bar');
  if (bar) {
    window.addEventListener('scroll', function() {
      var h   = document.documentElement;
      var pct = h.scrollTop / (h.scrollHeight - h.clientHeight) * 100;
      bar.style.width = Math.min(pct, 100) + '%';
    }, { passive: true });
  }

  var backTop = document.getElementById('back-top');
  if (backTop) {
    backTop.addEventListener('click', function(e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    window.addEventListener('scroll', function() {
      backTop.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
  }

  function copyCode(btn) {
    var pre = btn.closest('.code-wrap').querySelector('pre');
    var text = pre ? pre.innerText : '';
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'copiado ✓';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = 'copiar';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function() {
      btn.textContent = 'erro';
    });
  }

  var langLabels = {
    'python':'Python', 'py':'Python',
    'bash':'Bash', 'sh':'Bash', 'shell':'Shell', 'zsh':'Zsh',
    'rust':'Rust', 'rs':'Rust',
    'c':'C', 'cpp':'C++', 'cc':'C++',
    'js':'JavaScript', 'javascript':'JavaScript',
    'ts':'TypeScript', 'typescript':'TypeScript',
    'go':'Go', 'java':'Java', 'kotlin':'Kotlin',
    'html':'HTML', 'css':'CSS', 'scss':'SCSS',
    'yaml':'YAML', 'toml':'TOML', 'json':'JSON',
    'sql':'SQL', 'r':'R', 'julia':'Julia',
    'haskell':'Haskell', 'hs':'Haskell',
    'latex':'LaTeX', 'tex':'LaTeX',
    'markdown':'Markdown', 'md':'Markdown',
    'dockerfile':'Dockerfile', 'makefile':'Makefile'
  };

  document.querySelectorAll('.article-body .highlight').forEach(function(block) {
    var wrapper = document.createElement('div');
    wrapper.className = 'code-wrap';

    var lang = '';
    var codeEl = block.querySelector('code');
    if (codeEl && codeEl.className) {
      var m = codeEl.className.match(/language-(\w+)/);
      if (m) lang = m[1].toLowerCase();
    }

    if (lang) wrapper.setAttribute('data-lang', lang);

    var label = langLabels[lang]
      || (lang ? lang.charAt(0).toUpperCase() + lang.slice(1) : 'código');

    var header = document.createElement('div');
    header.className = 'code-header';
    header.innerHTML =
      '<span class="code-lang">' + label + '</span>' +
      '<button class="copy-btn" onclick="copyCode(this)">copiar</button>';

    block.parentNode.insertBefore(wrapper, block);
    wrapper.appendChild(header);
    wrapper.appendChild(block);
  });
  
  var layoutReady;

  function buildLayoutReady() {
    layoutReady = new Promise(function(resolve) {
      var fontsReady = document.fonts
        ? document.fonts.ready
        : Promise.resolve();

      var imagesReady = new Promise(function(res) {
        var pending = Array.from(document.images).filter(function(img) {
          return !img.complete;
        });
        if (pending.length === 0) return res();
        var count = pending.length;
        pending.forEach(function(img) {
          img.addEventListener('load',  function() { if (--count === 0) res(); });
          img.addEventListener('error', function() { if (--count === 0) res(); });
        });
      });

      Promise.all([fontsReady, imagesReady]).then(resolve);
    });
  }

  buildLayoutReady();

  window.addEventListener('pageshow', function(e) {
    if (e.persisted) buildLayoutReady();
  });

  function scrollToTarget(target) {
    var navHeight = (document.querySelector('.site-nav') || {}).offsetHeight || 52;
    var top = target.getBoundingClientRect().top + window.scrollY - navHeight - 20;
    window.scrollTo({ top: top, behavior: 'smooth' });
    target.classList.add('fn-highlight');
    setTimeout(function() { target.classList.remove('fn-highlight'); }, 2000);
  }

  document.addEventListener('click', function(e) {
    var a = e.target.closest(
      'a[href^="#fn:"], a[href^="#fnref:"], a.footnote-ref, a.footnote-backref'
    );
    if (!a) return;

    var href     = a.getAttribute('href');
    var targetId = href.slice(1);
    var target   = document.getElementById(targetId);
    if (!target) return;

    e.preventDefault();
    history.pushState(null, '', href);
    layoutReady.then(function() { scrollToTarget(target); });
  });

  window.addEventListener('hashchange', function() {
    var hash = window.location.hash;
    if (!hash || (!hash.startsWith('#fn:') && !hash.startsWith('#fnref:'))) return;
    var target = document.getElementById(hash.slice(1));
    if (target) layoutReady.then(function() { scrollToTarget(target); });
  });
  
</script>
