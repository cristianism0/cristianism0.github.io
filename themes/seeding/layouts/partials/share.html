{{/* Share buttons — add more: {{ partial "share.html" . }} shareButtons: true
no hugo.toml [params] */}}

{{ if and .Site.Params.shareButtons (ne .Params.shareButtons false) }}
<div class="share-bar" aria-label="Compartilhar artigo">
    <span class="share-label">Compartilhar:</span>

    <a
        class="share-btn"
        href="https://twitter.com/intent/tweet?text={{ .Title | urlquery }}&url={{ .Permalink | urlquery }}"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Compartilhar no Twitter"
    >
        Twitter
    </a>

    <a
        class="share-btn"
        href="https://bsky.app/intent/compose?text={{ .Title | urlquery }}%20{{ .Permalink | urlquery }}"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Compartilhar no Bluesky"
    >
        Bluesky
    </a>

    <a
        class="share-btn"
        href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlquery }}"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Compartilhar no LinkedIn"
    >
        LinkedIn
    </a>

    <a
        class="share-btn"
        href="https://wa.me/?text={{ .Title | urlquery }}%20{{ .Permalink | urlquery }}"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Compartilhar no WhatsApp"
    >
        WhatsApp
    </a>

    <button
        class="share-btn"
        onclick="copyPermalink(this, '{{ .Permalink }}')"
        aria-label="Copiar link"
    >
        Copiar link
    </button>
</div>

<script>
    function copyPermalink(btn, url) {
        navigator.clipboard.writeText(url).then(function () {
            btn.textContent = "✓ Copiado";
            btn.classList.add("copied");
            setTimeout(function () {
                btn.textContent = "Copiar link";
                btn.classList.remove("copied");
            }, 2000);
        });
    }
</script>
{{ end }}
