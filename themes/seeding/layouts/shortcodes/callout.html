{{/*
  Uso no markdown:
    {{< callout icon="💡" >}}
    **Nota:** texto da nota aqui.
    {{< /callout >}}

    {{< callout icon="⚠️" >}}
    **Atenção:** aviso importante.
    {{< /callout >}}
*/}}

{{ $icon := .Get "icon" | default "💡" }}
<div class="callout" role="note">
  <span class="callout-icon" aria-hidden="true">{{ $icon }}</span>
  <div class="callout-body">{{ .Inner | markdownify }}</div>
</div>
